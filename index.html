  --bg-pattern: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='44'%20height='44'%20viewBox='0%200%2044%2044'%3E%3Cpath%20d='M22%2033C22%2033%206%2022%206%2013%206%208%2010%206%2013.5%206%2017%206%2020%208.5%2022%2012%2024%208.5%2027%206%2030.5%206%2034%206%2038%208%2038%2013%2038%2022%2022%2033%2022%2033Z'%20fill='%23fb7185'%20fill-opacity='0.07'/%3E%3C/svg%3E");
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.5);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'ThmanyahSans', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  direction: rtl;
  background-color: var(--bg);
  background-image: var(--bg-pattern);
  color: var(--ink);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

button { cursor: pointer; border: none; background: none; font-size: inherit; color: inherit; }
input, textarea { font-family: 'ThmanyahSans', sans-serif; }

.display { font-family: 'ThmanyahDisplay', serif; }

/* ====== Layout ====== */
.app {
  max-width: 460px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background-color: var(--bg);
  background-image: var(--bg-pattern);
}

.header {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--card);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.header-brand { display: flex; align-items: center; gap: 8px; }
.header-brand .logo { font-size: 26px; }
.header-brand h1 { font-size: 24px; color: var(--rose); font-weight: 700; }
.header-brand .sync { font-size: 14px; opacity: .8; }
.theme-toggle {
  width: 40px; height: 40px; border-radius: 999px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 19px;
  background: var(--surface-2); transition: transform .12s, background .15s;
}
.theme-toggle:active { transform: scale(.9); }
.header-fam {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink-soft); font-weight: 600;
  background: var(--surface-2); padding: 6px 12px; border-radius: 999px;
}

.main { flex: 1; overflow-y: auto; padding-bottom: 92px; }

.page { padding: 16px; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.page-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.page-head h2 { font-size: 21px; font-weight: 700; color: var(--ink-strong); }
.badge {
  font-size: 13px; padding: 4px 12px; border-radius: 999px; font-weight: 600;
}
.badge-rose { background: var(--rose-light); color: var(--rose-dark); }
.badge-amber { background: var(--amber-light); color: var(--amber-text); }
.badge-gray { background: var(--surface-2); color: var(--ink-soft); }

/* ====== Empty / loading ====== */
.empty { text-align: center; padding: 64px 0; }
.empty .emo { font-size: 60px; margin-bottom: 12px; }
.empty p { color: var(--ink-faint); font-size: 14px; }

/* ====== Cards ====== */
.card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
}
.list { display: flex; flex-direction: column; gap: 10px; }

/* rule card */
.rule {
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.rule .num {
  color: var(--rose);
  font-weight: 700;
  min-width: 26px;
  text-align: center;
  margin-top: 1px;
}
.rule p { flex: 1; font-size: 14px; line-height: 1.7; color: var(--ink); }

.icon-x {
  color: var(--line-2); padding: 4px; font-size: 14px; line-height: 1;
  transition: color .15s;
}
.icon-x:hover { color: #f87171; }

/* ====== Shopping ====== */
.chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; direction: ltr; }
.chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 600; background: var(--card); color: var(--ink-soft);
  border: 1px solid var(--line-2); transition: all .15s; white-space: nowrap;
}
.chip.active { background: var(--amber); color: #fff; border-color: var(--amber); }

.clear-btn {
  width: 100%; font-size: 13px; color: #f87171; background: #fef2f2;
  padding: 10px; border-radius: 16px; margin-bottom: 16px; font-weight: 600;
  transition: background .15s;
}
.clear-btn:hover { background: #fee2e2; }

.item {
  background: var(--card); border-radius: 16px; padding: 14px 16px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
  transition: opacity .2s;
}
.item.done { opacity: .6; }
.item .body { flex: 1; min-width: 0; }
.item .body p { font-size: 14px; font-weight: 500; color: var(--ink); }
.item.done .body p { text-decoration: line-through; color: var(--ink-faint); }
.item .body span { font-size: 12px; color: var(--ink-faint); }

.check {
  width: 24px; height: 24px; border-radius: 999px; border: 2px solid #d1d5db;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  color: #fff; font-size: 12px; transition: all .15s; background: transparent;
}
.check:hover { border-color: var(--amber); }
.check.on { background: var(--green); border-color: var(--green); }
.check.on.rose:hover, .check.rose:hover { border-color: var(--green); }

/* ====== Travel grid ====== */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.dest {
  background: var(--card); border-radius: 18px; padding: 16px; box-shadow: var(--shadow);
  position: relative; transition: transform .12s, box-shadow .15s; text-align: center;
}
.dest:active { transform: scale(.96); }
.dest .flag { font-size: 38px; margin-bottom: 8px; }
.dest .name { font-weight: 700; color: var(--ink-strong); font-size: 14px; margin-bottom: 8px; line-height: 1.3; }
.dest .del { position: absolute; top: 8px; left: 8px; z-index: 2; }
.dest .meta { font-size: 11px; color: var(--ink-faint); margin-top: 8px; }
.status-pill {
  font-size: 11px; padding: 4px 8px; border-radius: 999px; font-weight: 600;
  display: block; text-align: center;
}
.st-planned { background: var(--blue-light); color: var(--blue-text); }
.st-soon { background: var(--amber-light); color: var(--amber-text); }
.st-visited { background: var(--green-light); color: var(--green-text); }

/* ====== Travel detail ====== */
.back {
  display: flex; align-items: center; gap: 4px; color: var(--ink-soft);
  margin-bottom: 18px; font-weight: 600; font-size: 14px;
}
.detail-head { background: var(--card); border-radius: 22px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; text-align: center; }
.detail-head .flag { font-size: 50px; margin-bottom: 6px; }
.detail-head h2 { font-size: 24px; font-weight: 700; color: var(--ink-strong); margin-bottom: 14px; }
.status-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.status-opt {
  padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
  background: var(--surface-2); color: var(--ink-faint); transition: all .15s;
}
.status-opt.active { box-shadow: 0 0 0 2px currentColor; }

.section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title h3 { font-weight: 700; color: var(--ink); font-size: 16px; }

.place {
  background: var(--card); border-radius: 16px; padding: 14px 16px; box-shadow: var(--shadow);
  display: flex; align-items: flex-start; gap: 12px;
}
.place .body { flex: 1; min-width: 0; }
.place .body p.title { font-size: 14px; font-weight: 600; color: var(--ink); }
.place.done .body p.title { text-decoration: line-through; color: var(--ink-faint); }
.place .body p.note { font-size: 12px; color: var(--ink-faint); margin-top: 2px; line-height: 1.6; }

.add-dashed {
  width: 100%; margin-top: 12px; border: 2px dashed #fda4af; color: #fb7185;
  border-radius: 16px; padding: 12px; font-size: 14px; font-weight: 600;
  transition: all .15s; background: transparent;
}
.add-dashed:hover { border-color: var(--rose); background: var(--rose-50); }

.notes-area {
  width: 100%; background: var(--card); border: 2px solid var(--line); border-radius: 16px;
  padding: 16px; font-size: 14px; color: var(--ink); outline: none; resize: none;
  box-shadow: var(--shadow); transition: border-color .15s; line-height: 1.7;
}
.notes-area:focus { border-color: #fda4af; }

/* ====== FAB ====== */
.fab {
  position: fixed; bottom: 96px; right: 16px; z-index: 40;
  width: 56px; height: 56px; border-radius: 999px; color: #fff;
  font-size: 30px; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg); transition: transform .12s, background .15s;
}
.fab:active { transform: scale(.92); }
.fab-rose { background: var(--rose); }
.fab-rose:hover { background: var(--rose-dark); }
.fab-amber { background: var(--amber); }
.fab-amber:hover { background: var(--amber-dark); }

/* center the FAB relative to the app column on wide screens */
@media (min-width: 460px) {
  .fab { right: calc(50% - 230px + 16px); }
}

/* ====== Bottom nav ====== */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
}
.nav-inner {
  max-width: 460px; margin: 0 auto; background: var(--card);
  border-top: 1px solid var(--line); display: flex;
  box-shadow: 0 -4px 20px rgba(0,0,0,.05);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 11px 0 16px; position: relative; color: var(--ink-faint); transition: color .15s;
}
.nav-btn.active { color: var(--rose); }
.nav-btn .tab-line {
  position: absolute; top: 0; left: 16px; right: 16px; height: 3px;
  background: var(--rose); border-radius: 0 0 4px 4px;
}
.nav-btn .emo { font-size: 21px; }
.nav-btn .lbl { font-size: 12px; font-weight: 600; }

/* ====== Snackbar (تراجع الحذف) ====== */
.snackbar {
  position: fixed; z-index: 45;
  bottom: calc(84px + env(safe-area-inset-bottom, 0px) + var(--kb, 0px));
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 428px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: #1f2937; color: #fff; border-radius: 16px;
  padding: 12px 14px 14px; box-shadow: 0 8px 30px rgba(0,0,0,.28);
  animation: rise .22s cubic-bezier(.2,.8,.2,1); overflow: hidden;
}
.snackbar::after {
  content: ''; position: absolute; bottom: 0; right: 0; height: 3px; width: 100%;
  background: var(--rose); transform-origin: right; animation: countdown 10s linear forwards;
}
@keyframes countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
.snackbar-txt { font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.snackbar-txt b { font-weight: 700; }
.snackbar-btn {
  flex-shrink: 0; background: rgba(255,255,255,.14); color: #fff;
  font-size: 14px; font-weight: 700; padding: 8px 16px; border-radius: 12px;
  transition: background .15s;
}
.snackbar-btn:active { background: rgba(255,255,255,.28); }

/* ====== Modal ====== */
.overlay {
  position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.5);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 16px; padding-bottom: calc(16px + var(--kb, 0px));
  animation: fade .2s ease; transition: padding-bottom .18s ease;
}
.sheet {
  background: var(--card); border-radius: 26px; padding: 24px; width: 100%; max-width: 460px;
  max-height: calc(100dvh - 32px - var(--kb, 0px)); overflow-y: auto;
  animation: rise .25s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise { from { transform: translateY(40px); opacity: .6; } to { transform: none; opacity: 1; } }
.sheet h3 { font-size: 18px; font-weight: 700; color: var(--ink-strong); margin-bottom: 16px; }

.field {
  width: 100%; border: 2px solid var(--rose-light); border-radius: 16px;
  padding: 12px 16px; font-size: 14px; color: var(--ink); outline: none;
  transition: border-color .15s; background: var(--card);
}
.field:focus { border-color: #fb7185; }
.field.amber { border-color: #fde68a; }
.field.amber:focus { border-color: var(--amber); }
.field.gray { border-color: var(--line-2); }
.field.gray:focus { border-color: #d1d5db; }
textarea.field { resize: none; line-height: 1.7; }

.hint { font-size: 12px; color: var(--ink-faint); margin-top: 8px; text-align: center; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.cat-opt {
  padding: 10px 4px; border-radius: 14px; font-size: 12px; font-weight: 700;
  background: var(--surface-2); color: var(--ink-soft); transition: all .15s; line-height: 1.5;
}
.cat-opt.active { background: var(--amber); color: #fff; box-shadow: var(--shadow); }

.status-pick { display: flex; gap: 8px; }
.status-pick button {
  flex: 1; padding: 10px; border-radius: 14px; font-size: 12px; font-weight: 700;
  background: var(--surface-2); color: var(--ink-soft); transition: all .15s;
}
.status-pick button.active { box-shadow: 0 0 0 2px currentColor; }

.btn-row { display: flex; gap: 12px; margin-top: 16px; }
.btn {
  flex: 1; border-radius: 16px; padding: 12px; font-weight: 700; font-size: 15px;
  transition: all .15s;
}
.btn-primary { background: var(--rose); color: #fff; }
.btn-primary:hover { background: var(--rose-dark); }
.btn-primary.amber { background: var(--amber); }
.btn-primary.amber:hover { background: var(--amber-dark); }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-ghost { background: var(--surface-2); color: var(--ink-soft); }

.flag-input {
  width: 60px; border: 2px solid var(--line-2); border-radius: 16px; padding: 12px 4px;
  font-size: 24px; text-align: center; outline: none; flex-shrink: 0;
}
.row-gap { display: flex; gap: 12px; }

/* ====== Setup screen ====== */
.setup {
  min-height: 100vh; min-height: 100dvh;
  background: linear-gradient(135deg, #fff1f2, #fce7f3, #fef3c7);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.setup-card {
  background: var(--card); border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,.12);
  padding: 36px 28px; width: 100%; max-width: 360px; text-align: center;
}
:root[data-theme="dark"] .setup { background: var(--bg); }
.setup-card .logo { font-size: 68px; margin-bottom: 12px; }
.setup-card h1 { font-size: 38px; color: var(--rose); font-weight: 700; margin-bottom: 2px; }
.setup-card .sub { color: var(--ink-faint); font-size: 14px; margin-bottom: 28px; }
.setup-form { display: flex; flex-direction: column; gap: 16px; }
.setup-form .field { text-align: center; padding: 14px; font-size: 16px; }
.warn {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 16px;
  padding: 14px; margin-bottom: 22px; text-align: right;
}
.warn .t { color: #b45309; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.warn .d { color: #d97706; font-size: 12px; line-height: 1.6; }

</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"
import {
  getFirestore, doc, onSnapshot, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"

const { useState, useEffect, useRef } = React
const html = htm.bind(React.createElement)

/* =========================================================================
   إعداد Firebase — المزامنة الفورية بين الأجهزة.
   هذه المفاتيح آمنة لتكون علنية (هذا تصميم Firebase). الحماية عبر قواعد Firestore.
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDZgcI6_cVVZtE8MVRbmFZm5fkugfEvpa0",
  authDomain: "beytna-1.firebaseapp.com",
  projectId: "beytna-1",
  storageBucket: "beytna-1.firebasestorage.app",
  messagingSenderId: "620832992420",
  appId: "1:620832992420:web:7c1d0fd075d9892d018a31"
}

let db = null
try {
  db = getFirestore(initializeApp(firebaseConfig))
} catch (e) {
  console.error('Firebase init failed — fallback to local', e)
}

const SECTIONS = ['rules', 'shopping', 'travel', 'packing']
const EMPTY = { rules: [], shopping: [], travel: [], packing: [] }
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6)

/* ---- تخزين محلي احتياطي (يُستخدم لو فشل Firebase أو بدون إنترنت) ---- */
const Local = {
  read(familyId) {
    const d = { ...EMPTY }
    for (const s of SECTIONS) {
      try { d[s] = JSON.parse(localStorage.getItem(`baytuna_${s}_${familyId}`) || '[]') } catch {}
    }
    return d
  },
  write(familyId, section, items) {
    localStorage.setItem(`baytuna_${section}_${familyId}`, JSON.stringify(items))
  },
}

/* =========================================================================
   المتجر المركزي: مستند واحد لكل عائلة في Firestore (families/{familyId})
   يحوي الأقسام الثلاثة. onSnapshot = تحديث لحظي عند أي طرف.
   ========================================================================= */
function useFamilyStore(familyId) {
  const [data, setData] = useState(null) // null = جاري التحميل
  const ref = useRef({ ...EMPTY })

  useEffect(() => {
    if (!familyId) { setData(null); return }

    if (db) {
      let loaded = false
      const docRef = doc(db, 'families', familyId)
      // مؤقّت أمان: لو ما وصلت البيانات خلال ٥ ثواني، افتح محلياً ولا تعلّق
      const timer = setTimeout(() => {
        if (!loaded) {
          const d = Local.read(familyId)
          ref.current = d
          setData(d)
        }
      }, 5000)
      const unsub = onSnapshot(docRef, (snap) => {
        loaded = true
        clearTimeout(timer)
        if (snap.exists()) {
          const d = { ...EMPTY, ...snap.data() }
          ref.current = d
          setData(d)
        } else {
          setDoc(docRef, { ...EMPTY }).catch(e => console.error(e))
          ref.current = { ...EMPTY }
          setData({ ...EMPTY })
        }
      }, (err) => {
        loaded = true
        clearTimeout(timer)
        console.error('Firestore error — using local', err)
        const d = Local.read(familyId)
        ref.current = d
        setData(d)
      })
      return () => { clearTimeout(timer); unsub() }
    } else {
      const d = Local.read(familyId)
      ref.current = d
      setData(d)
    }
  }, [familyId])

  const updateSection = (section, items) => {
    const next = { ...ref.current, [section]: items }
    ref.current = next
    setData(next) // تحديث تفاؤلي فوري
    if (db) {
      updateDoc(doc(db, 'families', familyId), { [section]: items }).catch(e => console.error(e))
    } else {
      Local.write(familyId, section, items)
    }
  }

  return { data, updateSection }
}

// واجهة قسم واحد بنفس الـAPI القديمة (items/add/update/remove/replaceAll)
// onRemove(name, prevItems, item) يُستدعى قبل الحذف لدعم التراجع
function section(store, name, onRemove) {
  const items = (store.data && store.data[name]) || []
  return {
    items,
    add: (d) => store.updateSection(name, [...items, { id: genId(), createdAt: Date.now(), ...d }]),
    update: (id, patch) => store.updateSection(name, items.map(it => it.id === id ? { ...it, ...patch } : it)),
    remove: (id) => {
      if (onRemove) onRemove(name, items, items.find(it => it.id === id))
      store.updateSection(name, items.filter(it => it.id !== id))
    },
    replaceAll: (next) => store.updateSection(name, next),
  }
}

/* =========================== مكونات مساعدة =========================== */

function Modal({ title, onClose, children }) {
  return html`
    <div class="overlay" onClick=${onClose}>
      <div class="sheet" onClick=${e => e.stopPropagation()}>
        <h3>${title}</h3>
        ${children}
      </div>
    </div>
  `
}

function Empty({ emo, text }) {
  return html`<div class="empty"><div class="emo">${emo}</div><p>${text}</p></div>`
}

/* =========================== ١) قواعد الزواج =========================== */

function MarriageRules({ col }) {
  const { items, add, remove } = col

  const [text, setText] = useState('')

  const submit = () => {
    if (!text.trim()) return
    add({ text: text.trim() })
    setText('')
    setOpen(false)
  }

  return html`
    <div class="page">
      <div class="page-head">
        <h2>قواعد زواجنا</h2>
        <span class="badge badge-rose">${items.length} قاعدة</span>
      </div>

      ${items.length === 0
        ? html`<${Empty} emo="💌" text="أضف أول قاعدة لزواجكم" />`

          <div class="list">
            ${items.map((r, i) => html`
              <div class="card rule" key=${r.id}>

                <p>${r.text}</p>

            dir="rtl"

            <button class="btn btn-primary" disabled=${!text.trim()} onClick=${submit}>إضافة</button>
            <button class="btn btn-ghost" onClick=${() => { setOpen(false); setText('') }}>إلغاء</button>
          </div>
        <//>
      `}
    </div>
  `
}

/* =========================== ٢) مقاضي البيت =========================== */

const CATS = [
  { id: 'food', label: 'مواد غذائية', icon: '🥦' },
  { id: 'home', label: 'منزليات', icon: '🏠' },
  { id: 'clothes', label: 'ملابس', icon: '👕' },
  { id: 'tech', label: 'إلكترونيات', icon: '📱' },
  { id: 'other', label: 'أخرى', icon: '📦' },
]
const catOf = (id) => CATS.find(c => c.id === id) || CATS[4]

function ShoppingList({ col }) {
  const { items, add, update, remove, replaceAll } = col
  const [open, setOpen] = useState(false)
  const [name, setName] = useState('')
  const [cat, setCat] = useState('food')
  const [filter, setFilter] = useState('all')

  const submit = () => {
    if (!name.trim()) return
    add({ name: name.trim(), category: cat, completed: false })
    setName('')
    setOpen(false)
  }

  const sorted = [...items].sort((a, b) => (a.completed ? 1 : 0) - (b.completed ? 1 : 0))
  const filtered = filter === 'all' ? sorted : sorted.filter(i => i.category === filter)
  const pending = items.filter(i => !i.completed).length
  const completed = items.filter(i => i.completed)

  return html`
    <div class="page">
      <div class="page-head">
        <h2>مقاضي البيت</h2>
        ${pending > 0 && html`<span class="badge badge-amber">${pending} باقي</span>`}
      </div>

      <div class="chips">
        <button class=${'chip' + (filter === 'all' ? ' active' : '')} onClick=${() => setFilter('all')}>الكل</button>
        ${CATS.map(c => html`
          <button key=${c.id} class=${'chip' + (filter === c.id ? ' active' : '')} onClick=${() => setFilter(c.id)}>
            ${c.icon} ${c.label}
          </button>
        `)}
      </div>

      ${completed.length > 0 && html`
        <button class="clear-btn" onClick=${() => replaceAll(items.filter(i => !i.completed))}>
          🗑️ حذف المكتملة (${completed.length})
        </button>
      `}

      ${filtered.length === 0
        ? html`<${Empty} emo="🛍️" text="لا يوجد عناصر" />`
        : html`
          <div class="list">
            ${filtered.map(it => {
              const c = catOf(it.category)
              return html`
                <div class=${'item' + (it.completed ? ' done' : '')} key=${it.id}>
                  <button class=${'check' + (it.completed ? ' on' : '')} onClick=${() => update(it.id, { completed: !it.completed })}>
                    ${it.completed ? '✓' : ''}
                  </button>
                  <div class="body">
                    <p>${it.name}</p>
                    <span>${c.icon} ${c.label}</span>
                  </div>
                  <button class="icon-x" onClick=${() => remove(it.id)}>✕</button>
                </div>
              `
            })}
          </div>
        `}

      <button class="fab fab-amber" onClick=${() => setOpen(true)}>+</button>

      ${open && html`
        <${Modal} title="إضافة غرض 🛍️" onClose=${() => { setOpen(false); setName('') }}>
          <input
            class="field amber"
            dir="rtl"
            autoFocus
            placeholder="اسم الغرض..."
            value=${name}
            onInput=${e => setName(e.target.value)}
            onKeyDown=${e => e.key === 'Enter' && submit()}
            style=${{ marginBottom: '16px' }}
          />
          <div class="cat-grid" style=${{ marginBottom: '20px' }}>
            ${CATS.map(c => html`
              <button key=${c.id} class=${'cat-opt' + (cat === c.id ? ' active' : '')} onClick=${() => setCat(c.id)}>
                ${c.icon}<br/>${c.label}
              </button>
            `)}
          </div>
          <div class="btn-row" style=${{ marginTop: 0 }}>
            <button class="btn btn-primary amber" disabled=${!name.trim()} onClick=${submit}>إضافة</button>
            <button class="btn btn-ghost" onClick=${() => { setOpen(false); setName('') }}>إلغاء</button>
          </div>
        <//>
      `}
    </div>
  `
}

/* =========================== ٣) السفر =========================== */

const STATUS = {
  planned: { label: 'مخطط', cls: 'st-planned' },
  soon: { label: 'قريباً', cls: 'st-soon' },
  visited: { label: '✓ تمت الزيارة', cls: 'st-visited' },
}

const FLAGS = {
  'السعودية': '🇸🇦', 'الإمارات': '🇦🇪', 'مصر': '🇪🇬', 'تركيا': '🇹🇷',
  'اليابان': '🇯🇵', 'فرنسا': '🇫🇷', 'إيطاليا': '🇮🇹', 'إسبانيا': '🇪🇸',
  'بريطانيا': '🇬🇧', 'لندن': '🇬🇧', 'أمريكا': '🇺🇸', 'كندا': '🇨🇦', 'أستراليا': '🇦🇺',
  'المالديف': '🇲🇻', 'تايلاند': '🇹🇭', 'سنغافورة': '🇸🇬', 'اليونان': '🇬🇷',
  'المغرب': '🇲🇦', 'الأردن': '🇯🇴', 'لبنان': '🇱🇧', 'سويسرا': '🇨🇭',
  'ألمانيا': '🇩🇪', 'هولندا': '🇳🇱', 'البرتغال': '🇵🇹', 'النمسا': '🇦🇹',
  'إندونيسيا': '🇮🇩', 'بالي': '🇮🇩', 'ماليزيا': '🇲🇾', 'البحرين': '🇧🇭',
  'الكويت': '🇰🇼', 'قطر': '🇶🇦', 'عمان': '🇴🇲', 'جورجيا': '🇬🇪', 'أذربيجان': '🇦🇿',
}

function CountryDetail({ dest, onBack, onUpdate }) {
  const places = dest.places || []
  const [open, setOpen] = useState(false)
  const [pName, setPName] = useState('')
  const [pNote, setPNote] = useState('')
  const [notes, setNotes] = useState(dest.notes || '')

  // مزامنة الملاحظات لو عدّلها الطرف الثاني
  useEffect(() => { setNotes(dest.notes || '') }, [dest.notes])

  const addPlace = () => {
    if (!pName.trim()) return
    const place = { id: Date.now().toString(), name: pName.trim(), notes: pNote.trim(), visited: false }
    onUpdate({ places: [...places, place] })
    setPName(''); setPNote(''); setOpen(false)
  }
  const togglePlace = (id) => onUpdate({ places: places.map(p => p.id === id ? { ...p, visited: !p.visited } : p) })
  const delPlace = (id) => onUpdate({ places: places.filter(p => p.id !== id) })

  const visited = places.filter(p => p.visited).length

  return html`
    <div class="page">
      <button class="back" onClick=${onBack}><span>→</span> رجوع</button>

      <div class="detail-head">
        <div class="flag">${dest.flag}</div>
        <h2>${dest.country}</h2>
        <div class="status-row">
          ${Object.entries(STATUS).map(([k, v]) => html`
            <button
              key=${k}
              class=${'status-opt ' + (dest.status === k ? v.cls + ' active' : '')}
              onClick=${() => onUpdate({ status: k })}
            >${v.label}</button>
          `)}
        </div>
      </div>

      <div style=${{ marginBottom: '16px' }}>
        <div class="section-title">
          <h3>الأماكن 📍</h3>
          ${places.length > 0 && html`<span class="badge badge-gray">${visited}/${places.length}</span>`}
        </div>
        <div class="list">
          ${places.map(p => html`
            <div class=${'place' + (p.visited ? ' done' : '')} key=${p.id}>
              <button class=${'check' + (p.visited ? ' on' : '')} onClick=${() => togglePlace(p.id)}>
                ${p.visited ? '✓' : ''}
              </button>
              <div class="body">
                <p class="title">${p.name}</p>
                ${p.notes && html`<p class="note">${p.notes}</p>`}
              </div>
              <button class="icon-x" onClick=${() => delPlace(p.id)}>✕</button>
            </div>
          `)}
        </div>
        <button class="add-dashed" onClick=${() => setOpen(true)}>+ إضافة مكان</button>
      </div>

      <div>
        <div class="section-title"><h3>ملاحظات 📝</h3></div>
        <textarea
          class="notes-area"
          rows="4"
          dir="rtl"
          placeholder="أكتب خططكم وأفكاركم عن الرحلة..."
          value=${notes}
          onInput=${e => setNotes(e.target.value)}
          onBlur=${() => onUpdate({ notes })}
        ></textarea>
      </div>

      ${open && html`
        <${Modal} title="إضافة مكان 📍" onClose=${() => setOpen(false)}>
          <input class="field" dir="rtl" autoFocus placeholder="اسم المكان..."
            value=${pName} onInput=${e => setPName(e.target.value)}
            style=${{ marginBottom: '12px' }} />
          <input class="field gray" dir="rtl" placeholder="ملاحظات (اختياري)..."
            value=${pNote} onInput=${e => setPNote(e.target.value)}
            onKeyDown=${e => e.key === 'Enter' && addPlace()}
            style=${{ marginBottom: '16px' }} />
          <div class="btn-row" style=${{ marginTop: 0 }}>
            <button class="btn btn-primary" disabled=${!pName.trim()} onClick=${addPlace}>إضافة</button>
            <button class="btn btn-ghost" onClick=${() => setOpen(false)}>إلغاء</button>
          </div>
        <//>
      `}
    </div>
  `
}

function Travel({ col }) {
  const { items, add, update, remove } = col
  const [selId, setSelId] = useState(null)
  const [open, setOpen] = useState(false)
  const [country, setCountry] = useState('')
  const [flag, setFlag] = useState('🌍')
  const [status, setStatus] = useState('planned')

  const selected = items.find(d => d.id === selId)

  const submit = () => {
    if (!country.trim()) return
    add({ country: country.trim(), flag: FLAGS[country.trim()] || flag, status, places: [], notes: '' })
    setCountry(''); setFlag('🌍'); setStatus('planned'); setOpen(false)
  }
  const onCountry = (val) => {
    setCountry(val)
    if (FLAGS[val.trim()]) setFlag(FLAGS[val.trim()])
  }

  if (selected) {
    return html`<${CountryDetail}
      dest=${selected}
      onBack=${() => setSelId(null)}
      onUpdate=${(patch) => update(selected.id, patch)}
    />`
  }

  return html`
    <div class="page">
      <div class="page-head">
        <h2>سفراتنا</h2>
        <span class="badge badge-rose">${items.length} وجهة</span>
      </div>

      ${items.length === 0
        ? html`<${Empty} emo="🗺️" text="أضف أول وجهة سفر" />`
        : html`
          <div class="grid">
            ${items.map(d => {
              const st = STATUS[d.status] || STATUS.planned
              const places = d.places || []
              const visited = places.filter(p => p.visited).length
              return html`
                <div class="dest" key=${d.id} onClick=${() => setSelId(d.id)}>
                  <button class="icon-x del" onClick=${e => { e.stopPropagation(); remove(d.id) }}>✕</button>
                  <div class="flag">${d.flag}</div>
                  <div class="name">${d.country}</div>
                  <span class=${'status-pill ' + st.cls}>${st.label}</span>
                  ${places.length > 0 && html`<p class="meta">${visited}/${places.length} مكان</p>`}
                </div>
              `
            })}
          </div>
        `}

      <button class="fab fab-rose" onClick=${() => setOpen(true)}>+</button>

      ${open && html`
        <${Modal} title="وجهة جديدة 🌍" onClose=${() => setOpen(false)}>
          <div class="row-gap" style=${{ marginBottom: '16px' }}>
            <input class="flag-input" value=${flag} onInput=${e => setFlag(e.target.value)} />
            <input class="field" dir="rtl" autoFocus placeholder="اسم البلد أو المدينة..."
              value=${country} onInput=${e => onCountry(e.target.value)}
              onKeyDown=${e => e.key === 'Enter' && submit()} />
          </div>
          <p class="hint" style=${{ marginBottom: '12px' }}>العلم يتحدد تلقائياً للدول العربية والمعروفة 🏳️</p>
          <div class="status-pick" style=${{ marginBottom: '20px' }}>
            ${Object.entries(STATUS).map(([k, v]) => html`
              <button key=${k} class=${(status === k ? v.cls + ' active' : '')} onClick=${() => setStatus(k)}>
                ${v.label}
              </button>
            `)}
          </div>
          <div class="btn-row" style=${{ marginTop: 0 }}>
            <button class="btn btn-primary" disabled=${!country.trim()} onClick=${submit}>إضافة</button>
            <button class="btn btn-ghost" onClick=${() => setOpen(false)}>إلغاء</button>
          </div>
        <//>
      `}
    </div>
  `
}

/* =========================== ٤) تجهيزات الشنطة =========================== */

function PackingList({ col }) {
  const { items, add, update, remove, replaceAll } = col
  const [open, setOpen] = useState(false)
  const [name, setName] = useState('')
  const [fixed, setFixed] = useState(true)

  const submit = () => {
    if (!name.trim()) return
    add({ name: name.trim(), fixed, packed: false })
    setName('')
    setOpen(false)
  }

  const sortPacked = (arr) => [...arr].sort((a, b) => (a.packed ? 1 : 0) - (b.packed ? 1 : 0))
  const essentials = sortPacked(items.filter(i => i.fixed))
  const optional = sortPacked(items.filter(i => !i.fixed))
  const remaining = items.filter(i => !i.packed).length

  const newTrip = () => {
    if (items.length === 0) return
    if (confirm('تبدأ تجهيز رحلة جديدة؟ بنشيل كل علامات الصح عشان تعبّي من جديد (الأغراض تبقى محفوظة).')) {
      replaceAll(items.map(i => ({ ...i, packed: false })))
    }
  }

  const renderGroup = (title, emo, arr) => arr.length > 0 && html`
    <div style=${{ marginBottom: '18px' }}>
      <div class="section-title">
        <h3>${emo} ${title}</h3>
        <span class="badge badge-gray">${arr.filter(i => i.packed).length}/${arr.length}</span>
      </div>
      <div class="list">
        ${arr.map(it => html`
          <div class=${'item' + (it.packed ? ' done' : '')} key=${it.id}>
            <button class=${'check' + (it.packed ? ' on' : '')} onClick=${() => update(it.id, { packed: !it.packed })}>
              ${it.packed ? '✓' : ''}
            </button>
            <div class="body"><p>${it.name}</p></div>
            <button class="icon-x" onClick=${() => remove(it.id)}>✕</button>
          </div>
        `)}
      </div>
    </div>
  `

  return html`
    <div class="page">
      <div class="page-head">
        <h2>تجهيزات الشنطة</h2>
        ${remaining > 0 && html`<span class="badge badge-rose">${remaining} باقي</span>`}
      </div>

      ${items.length > 0 && html`
        <button class="clear-btn" onClick=${newTrip} style=${{ color: 'var(--rose)', background: 'var(--rose-50)' }}>
          🧳 تجهيز رحلة جديدة (تفريغ العلامات)
        </button>
      `}

      ${items.length === 0
        ? html`<${Empty} emo="🧳" text="أضف أغراض شنطتك" />`
        : html`
          ${renderGroup('أساسيات ثابتة', '📌', essentials)}
          ${renderGroup('حسب الرحلة', '🌤️', optional)}
        `}

      <button class="fab fab-rose" onClick=${() => setOpen(true)}>+</button>

      ${open && html`
        <${Modal} title="إضافة غرض 🧳" onClose=${() => { setOpen(false); setName('') }}>
          <input
            class="field"
            dir="rtl"
            autoFocus
            placeholder="اسم الغرض..."
            value=${name}
            onInput=${e => setName(e.target.value)}
            onKeyDown=${e => e.key === 'Enter' && submit()}
            style=${{ marginBottom: '16px' }}
          />
          <div class="cat-grid" style=${{ gridTemplateColumns: '1fr 1fr', marginBottom: '8px' }}>
            <button class=${'cat-opt' + (fixed ? ' active' : '')} onClick=${() => setFixed(true)}>
              📌<br/>أساسي ثابت
            </button>
            <button class=${'cat-opt' + (!fixed ? ' active' : '')} onClick=${() => setFixed(false)}>
              🌤️<br/>حسب الرحلة
            </button>
          </div>
          <p class="hint" style=${{ marginBottom: '20px' }}>الأساسيات تاخذها كل سفرة، و"حسب الرحلة" تتغيّر من وجهة لوجهة 🧳</p>
          <div class="btn-row" style=${{ marginTop: 0 }}>
            <button class="btn btn-primary" disabled=${!name.trim()} onClick=${submit}>إضافة</button>
            <button class="btn btn-ghost" onClick=${() => { setOpen(false); setName('') }}>إلغاء</button>
          </div>
        <//>
      `}
    </div>
  `
}

/* =========================== التطبيق =========================== */

const TABS = [
  { id: 'rules', label: 'القواعد', emo: '💑' },
  { id: 'shopping', label: 'المقاضي', emo: '🛒' },
  { id: 'travel', label: 'السفر', emo: '✈️' },
  { id: 'packing', label: 'الشنطة', emo: '🧳' },
]

// معرّف البيت الثابت — التطبيق لشخصين فقط، فلا حاجة لشاشة إدخال الاسم
const FAMILY_ID = 'beytna'

function App() {
  const [tab, setTab] = useState('rules')
  const [theme, setTheme] = useState(() =>
    localStorage.getItem('baytuna_theme') ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
  const store = useFamilyStore(FAMILY_ID)

  useEffect(() => {
    document.documentElement.dataset.theme = theme
    localStorage.setItem('baytuna_theme', theme)
  }, [theme])
  const toggleTheme = () => setTheme(t => (t === 'dark' ? 'light' : 'dark'))

  // ---- ارتفاع الكيبورد: نرفع النوافذ فوقه حتى لا يختفي مكان الكتابة ----
  useEffect(() => {
    const vv = window.visualViewport
    if (!vv) return
    const onResize = () => {
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop)
      document.documentElement.style.setProperty('--kb', kb + 'px')
    }
    vv.addEventListener('resize', onResize)
    vv.addEventListener('scroll', onResize)
    onResize()
    return () => { vv.removeEventListener('resize', onResize); vv.removeEventListener('scroll', onResize) }
  }, [])

  // ---- التراجع عن الحذف (١٠ ثواني) ----
  const [undo, setUndo] = useState(null) // { section, prevItems, label }
  const undoTimer = useRef(null)
  const requestUndo = (name, prevItems, item) => {
    const label = (item && (item.name || item.country || item.text)) || ''
    setUndo({ section: name, prevItems, label })
    clearTimeout(undoTimer.current)
    undoTimer.current = setTimeout(() => setUndo(null), 10000)
  }
  const doUndo = () => {
    if (!undo) return
    store.updateSection(undo.section, undo.prevItems)
    clearTimeout(undoTimer.current)
    setUndo(null)
  }
  useEffect(() => () => clearTimeout(undoTimer.current), [])

  if (!store.data) {
    return html`<div class="setup"><div class="setup-card">
      <div class="logo">🏡</div>
      <p class="sub">جاري المزامنة... ☁️</p>
    </div></div>`
  }

  const shortLabel = (s) => (s.length > 24 ? s.slice(0, 24) + '…' : s)

  return html`
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <span class="logo">🏡</span>
          <h1 class="display">بيتنا</h1>
          <span class="sync" title=${db ? 'مزامنة فورية مفعّلة' : 'محلي فقط'}>${db ? '☁️' : '💾'}</span>
        </div>
        <button class="theme-toggle" onClick=${toggleTheme} title=${theme === 'dark' ? 'الوضع النهاري' : 'الوضع الليلي'}>
          ${theme === 'dark' ? '☀️' : '🌙'}
        </button>
      </header>

      <main class="main">
        ${tab === 'rules' && html`<${MarriageRules} col=${section(store, 'rules', requestUndo)} key="rules" />`}
        ${tab === 'shopping' && html`<${ShoppingList} col=${section(store, 'shopping', requestUndo)} key="shopping" />`}
        ${tab === 'travel' && html`<${Travel} col=${section(store, 'travel', requestUndo)} key="travel" />`}
        ${tab === 'packing' && html`<${PackingList} col=${section(store, 'packing', requestUndo)} key="packing" />`}
      </main>

      ${undo && html`
        <div class="snackbar" key=${undo.prevItems.length + '-' + undo.label}>
          <span class="snackbar-txt">🗑️ تم الحذف${undo.label ? html`: <b>${shortLabel(undo.label)}</b>` : ''}</span>
          <button class="snackbar-btn" onClick=${doUndo}>↩︎ تراجع</button>
        </div>
      `}

      <nav class="nav">
        <div class="nav-inner">
          ${TABS.map(t => html`
            <button key=${t.id} class=${'nav-btn' + (tab === t.id ? ' active' : '')} onClick=${() => setTab(t.id)}>
              ${tab === t.id && html`<span class="tab-line"></span>`}
              <span class="emo">${t.emo}</span>
              <span class="lbl">${t.label}</span>
            </button>
          `)}
        </div>
      </nav>
    </div>
  `
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`)

</script>
</body>
</html>
